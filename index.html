        .header-text p { font-size: 13px; color: #9CA3AF; font-weight: 500; letter-spacing: 0.3px; }
        .header-stats { display: flex; gap: 30px; flex-wrap: wrap; justify-content: flex-end; }
        .stat-box { text-align: right; }
        .stat-value { font-size: 28px; font-weight: 700; color: #FFBD48; }
        .stat-label { font-size: 12px; color: #9CA3AF; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Tabs */
        .tab-bar {
            background-color: #202647;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 30px;
            display: flex; gap: 40px; padding: 0 20px;
            max-width: 1400px; margin-left: auto; margin-right: auto;
        }
        .tab {
            padding: 16px 0; border: none; background: none; cursor: pointer;
            font-size: 15px; font-weight: 500; color: #9CA3AF;
            border-bottom: 3px solid transparent; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .tab:hover { color: #F9FAFB; }
        .tab.active { color: #FFBD48; border-bottom-color: #FFBD48; }

        /* Cards */
        .card {
            background-color: #2A3057;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 24px;
            margin-bottom: 20px;
        }
        .card-header {
            font-size: 18px; font-weight: 700; color: #F9FAFB;
            margin-bottom: 20px; padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .card-subtitle {
            font-size: 12px; color: #9CA3AF; text-transform: uppercase;
            letter-spacing: 0.3px; margin-bottom: 16px;
        }

        /* Grids */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 20px; }

        /* Stat Callouts */
        .stat-callout {
            background-color: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-left: 4px solid #FFBD48;
            border-radius: 8px; padding: 16px; margin-bottom: 12px;
        }
        .stat-callout.jade { border-left-color: #178287; }
        .stat-callout.teal { border-left-color: #3BA8AE; }
        .stat-callout-label { font-size: 11px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px; }
        .stat-callout-value { font-size: 24px; font-weight: 700; color: #F9FAFB; }
        .stat-callout-meta { font-size: 12px; color: #9CA3AF; margin-top: 6px; }

        /* Tables */
        .table-container { overflow-x: auto; margin-top: 16px; }
        table { width: 100%; border-collapse: collapse; }
        thead { background-color: rgba(255,255,255,0.05); }
        th { padding: 12px 16px; text-align: left; font-weight: 600; font-size: 12px; color: #9CA3AF; border-bottom: 1px solid rgba(255,255,255,0.06); text-transform: uppercase; letter-spacing: 0.3px; }
        td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; color: #E5E7EB; }
        tbody tr:hover { background-color: rgba(255,255,255,0.03); }
        tbody tr:last-child td { border-bottom: none; }

        .region-badge {

        .region-badge.asia { background: rgba(81,160,148,0.15); color: #7CC4B8; }
        .region-badge.other { background: rgba(128,144,168,0.15); color: #8090A8; }

        .acquirer-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .acquirer-label { width: 80px; font-size: 13px; font-weight: 600; color: #E5E7EB; flex-shrink: 0; }
        .acquirer-bar-bg { flex: 1; height: 24px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
        .acquirer-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .acquirer-count { width: 60px; text-align: right; font-size: 13px; font-weight: 600; color: #F9FAFB; flex-shrink: 0; }

        /* Chart Container */
        .chart-container { width: 100%; height: 320px; margin: 20px 0; }
        .chart-container.tall { height: 420px; }

        /* Progress Bar */
        .progress-bar { width: 100%; height: 8px; background-color: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; margin: 12px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #FFBD48 0%, #178287 100%); border-radius: 4px; }

        /* Text */
        .text-large { font-size: 16px; color: #E5E7EB; margin-bottom: 12px; line-height: 1.6; }
        .text-small { font-size: 12px; color: #9CA3AF; margin-bottom: 8px; }

        .badge { display: inline-block; padding: 4px 12px; background-color: rgba(255,255,255,0.1); color: #E5E7EB; font-size: 11px; font-weight: 600; border-radius: 4px; margin-right: 8px; }

        .badge.yellow { background-color: rgba(255,189,72,0.15); color: #FFBD48; }

        /* Details link */
        table a[target="_blank"] { opacity: 0.7; transition: opacity 0.15s; }
        table a[target="_blank"]:hover { opacity: 1; text-decoration: underline; }


        /* Sortable table headers */
        th.sortable { cursor: pointer; user-select: none; position: relative; padding-right: 24px; }
        th.sortable:hover { color: #FFBD48; }
        th.sortable::after { content: '⇅'; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 10px; opacity: 0.4; }
        th.sortable.asc::after { content: '↑'; opacity: 0.9; color: #FFBD48; }
        th.sortable.desc::after { content: '↓'; opacity: 0.9; color: #FFBD48; }

        /* Search box */
        .search-box {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 10px 16px; color: #E5E7EB; font-size: 14px;
            font-family: 'Inter', sans-serif; width: 100%; max-width: 400px;
            outline: none; transition: border-color 0.2s;

        .search-box:focus { border-color: #FFBD48; }
        .search-box::placeholder { color: #6B7280; }

        .pagination { display: flex; align-items: center; gap: 8px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
        .page-btn {

        .page-btn.active { background: rgba(255,189,72,0.15); color: #FFBD48; border-color: #FFBD48; }
        .page-btn:disabled { opacity: 0.3; cursor: default; }
        .page-info { color: #6B7280; font-size: 13px; margin: 0 8px; }

        .deal-fresh { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22C55E; margin-right: 8px; flex-shrink: 0; }

        .deal-entry-meta { font-size: 12px; color: #6B7280; margin-top: 3px; }
        .deal-entry-value { font-size: 18px; font-weight: 700; text-align: right; white-space: nowrap; margin-left: 16px; }
        .deal-entry-value.usa-color { color: #FFBD48; }
        .deal-entry-value.eu-color { color: #3BA8AE; }
        .badge-blocked { display: inline-block; padding: 2px 8px; background-color: rgba(239,68,68,0.2); color: #EF4444; font-size: 10px; font-weight: 700; border-radius: 4px; margin-left: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

        .insight-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
        .insight-title { font-weight: 600; color: #F9FAFB; font-size: 14px; margin-bottom: 3px; }
        .insight-body { color: #D1D5DB; font-size: 13px; line-height: 1.6; }
        .insight-body .hl { color: #FFBD48; font-weight: 600; }
        .insight-body .hl-green { color: #3BA8AE; font-weight: 600; }

        .recharts-default-tooltip { background-color: #1F2937 !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 8px !important; color: #E5E7EB !important; }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid-3 { grid-template-columns: 1fr 1fr; }
            .grid-4, .grid-5 { grid-template-columns: repeat(3, 1fr); }
            .header-content { flex-direction: column; gap: 20px; }
            .header-stats { width: 100%; justify-content: flex-start; }
        }
        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr; }
            .header-text h1 { font-size: 24px; }
            .stat-value { font-size: 22px; }
            .tab-bar { gap: 20px; overflow-x: auto; }
            .tab { padding: 12px 0; font-size: 13px; }
            .chart-container, .chart-container.tall { height: 280px; }
        }
    </style>

                    if (!items.length) { const old = tip.querySelector('.recharts-tooltip-total'); if (old) old.remove(); return; }
                    let sum = 0;
                    items.forEach(item => {

                    });
                    const hdr = tip.closest('.recharts-wrapper')?.parentElement?.parentElement?.querySelector('.card-header')?.textContent || '';

                        h('p', { className: 'text-small', style: { marginBottom: '12px' } }, 'Trade secret protection varies significantly across jurisdictions. EU GDPR compliance and US export control laws (EAR/ITAR) create additional integration challenges. Technology transfer restrictions on China-facing exports are material to deal valuations.'),
                        h('h3', { style: { fontSize: '16px', color: '#FFBD48', marginBottom: '12px', marginTop: '20px' } }, 'Technology Valuation Metrics'),
                        h('p', { className: 'text-small', style: { marginBottom: '12px' } }, 'Disclosed photonics deals typically command 3-8x revenue multiples based on IP defensibility. The largest deals (>$10B) usually target companies with patent moats in integrated photonics, quantum sensors, or specialty semiconductors.'),
                        h('h3', { style: { fontSize: '16px', color: '#FFBD48', marginBottom: '12px', marginTop: '20px' } }, 'Cross-Border Integration Risks'),
                        h('p', { className: 'text-small' }, 'USA→Europe transactions benefit from stronger EU IP enforcement but face longer patent prosecution timelines. Europe→USA deals gain access to US markets but must address stringent US patent standards. Both directions benefit from trade secret consolidation under unified policies.')
                    )
                )
            );
        };


        // ── Latest Deals Tab ──
        const LatestDealsTab = ({ data }) => {
            // Compute cutoff: 6 months before lastUpdated
            const lastUpdated = data.lastUpdated || new Date().toISOString().slice(0, 10);
            const cutoff = new Date(lastUpdated);
            cutoff.setMonth(cutoff.getMonth() - 6);
            const cutoffYear = cutoff.getFullYear();
            const cutoffMonth = cutoff.getMonth(); // 0-indexed
            const MONTH_MAP = { January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11,
                Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };

            // Combine all three deal arrays into one pool
            const allPool = [];
            (data.usaBuyEU || []).forEach(d => allPool.push({ ...d, flow: 'USA → EU' }));
            (data.euBuyUSA || []).forEach(d => allPool.push({ ...d, flow: 'EU → USA' }));
            // For allDeals (if available from scraper) use it instead for full coverage
            if (data.allDeals && data.allDeals.length > 0) {
                allPool.length = 0; // clear and use allDeals instead
                data.allDeals.forEach(d => {
                    const flow = d.aR === 'USA' && d.tR === 'Europe' ? 'USA → Europe' :
                                 d.aR === 'Europe' && d.tR === 'USA' ? 'Europe → USA' :
                                 d.aR + ' → ' + d.tR;
                    allPool.push({ acq: d.acq, tgt: d.tgt, yr: d.yr, mo: d.mo, v: d.v, url: d.url, flow, tgtC: d.tgtC || '', acqC: d.acqC || '', aR: d.aR, tR: d.tR, type: d.type || '' });
                });
            }

            // Filter to last 6 months
            const recent = allPool.filter(d => {
                if (!d.yr) return false;
                if (d.yr > cutoffYear) return true;
                if (d.yr === cutoffYear) {
                    const mi = MONTH_MAP[d.mo];
                    if (mi === undefined) return true; // unknown month in cutoff year → include
                    return mi >= cutoffMonth;
                }
                return false;
            });

            // Sort by year desc, value desc
            recent.sort((a, b) => (b.yr - a.yr) || ((b.v || 0) - (a.v || 0)));

            // Freshness: deals in last 2 months get green dot, rest get yellow
            const freshCutoff = new Date(lastUpdated);
            freshCutoff.setMonth(freshCutoff.getMonth() - 2);
            const freshYear = freshCutoff.getFullYear();
            const freshMonth = freshCutoff.getMonth();

            const isFresh = (d) => {
                if (d.yr > freshYear) return true;
                if (d.yr === freshYear) {
                    const mi = MONTH_MAP[d.mo];
                    return mi === undefined || mi >= freshMonth;
                }
                return false;
            };

            const totalVal = recent.reduce((s, d) => s + (d.v || 0), 0);

            return h('div', { className: 'tab-content active' },
                // Info banner
                h('div', { style: { background: 'rgba(255,189,72,0.08)', border: '1px solid rgba(255,189,72,0.25)', borderRadius: '12px', padding: '20px 24px', marginBottom: '24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '16px' } },
                    h('div', null,
                        h('div', { style: { fontSize: '18px', fontWeight: 700, color: '#F9FAFB', marginBottom: '4px' } }, 'Deals from the Last 6 Months'),
                        h('div', { style: { fontSize: '13px', color: '#9CA3AF' } },
                            'Showing deals since ' + cutoff.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) + ' · Data last scraped: ' + lastUpdated
                        )
                    ),
                    h('div', { style: { display: 'flex', gap: '32px' } },
                        h('div', { style: { textAlign: 'right' } },
                            h('div', { style: { fontSize: '28px', fontWeight: 700, color: '#FFBD48' } }, recent.length),
                            h('div', { style: { fontSize: '11px', color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: '0.3px' } }, 'Recent Deals')
                        ),
                        h('div', { style: { textAlign: 'right' } },
                            h('div', { style: { fontSize: '28px', fontWeight: 700, color: '#3BA8AE' } }, totalVal ? '$' + (totalVal >= 1000 ? (totalVal/1000).toFixed(1) + 'B' : totalVal + 'M') : '—'),
                            h('div', { style: { fontSize: '11px', color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: '0.3px' } }, 'Disclosed Value')
                        )
                    )
                ),

                // Legend
                h('div', { style: { display: 'flex', gap: '24px', marginBottom: '16px', fontSize: '12px', color: '#9CA3AF' } },
                    h('span', null, h('span', { className: 'deal-fresh' }), 'Last 2 months'),
                    h('span', null, h('span', { className: 'deal-recent' }), '3–6 months ago')
                ),

                // Table
                h('div', { className: 'card' },
                    h('div', { className: 'table-container' },
                        h('table', null,
                            h('thead', null,
                                h('tr', null,
                                    h('th', { style: { width: '28px' } }, ''),
                                    h('th', null, 'Date'),
                                    h('th', null, 'Acquirer'),
                                    h('th', null, 'Target'),
                                    h('th', null, 'Flow'),
                                    h('th', { style: { textAlign: 'right' } }, 'Value ($M)'),
                                    h('th', { style: { width: '52px', textAlign: 'center' } }, '')

                            ),
                            h('tbody', null,
                                recent.length === 0
                                    ? h('tr', null, h('td', { colSpan: 7, style: { textAlign: 'center', color: '#6B7280', padding: '40px' } }, 'No deals found in the last 6 months'))
                                    : recent.map((d, i) =>

                                            h('td', { style: { fontWeight: 600 } }, d.acq),
                                            h('td', null, d.tgt, d.tgtC ? h('span', { style: { color: '#6B7280', marginLeft: '6px', fontSize: '12px' } }, '(' + d.tgtC + ')') : null),

                                            h('td', { style: { textAlign: 'right', fontWeight: 600 } }, d.v ? '$' + d.v.toLocaleString() : '—'),
                                            h('td', { style: { textAlign: 'center' } },

                                            )
                                        )
                                    )
                            )
                        )
                    )

        };

        // ── Review Tab (classification editor) ──
        const ReviewTab = ({ data }) => {

                        setReviewDeals(raw.deals || []);

                })();
            }, []);

            // ALL hooks must be above any early return
            const filteredIndices = React.useMemo(() => {
                if (!reviewDeals) return [];
                const q = search.toLowerCase();
                const indices = [];
                reviewDeals.forEach((d, i) => {
                    if (filterMode === 'relevant' && d.cls !== 'relevant') return;
                    if (filterMode === 'other' && d.cls !== 'other') return;
                    if (q && !(
                        (d.acq || '').toLowerCase().includes(q) ||
                        (d.tgt || '').toLowerCase().includes(q) ||
                        (d.acqC || '').toLowerCase().includes(q) ||
                        (d.tgtC || '').toLowerCase().includes(q) ||
                        String(d.yr).includes(q)
                    )) return;
                    indices.push(i);
                });
                return indices;
            }, [reviewDeals, search, filterMode]);

            const sortedIndices = React.useMemo(() => {
                if (!reviewDeals) return [];
                const arr = [...filteredIndices];
                const dir = sortDir === 'asc' ? 1 : -1;
                arr.sort((a, b) => {
                    const ad = reviewDeals[a], bd = reviewDeals[b];
                    if (sortCol === 'cls') {
                        return (ad.cls < bd.cls ? -1 : ad.cls > bd.cls ? 1 : 0) * dir;
                    }
                    if (sortCol === 'v') return ((ad.v || 0) - (bd.v || 0)) * dir;
                    if (sortCol === 'yr') return ((ad.yr || 0) - (bd.yr || 0)) * dir;
                    const av = (ad[sortCol] || '').toLowerCase(), bv = (bd[sortCol] || '').toLowerCase();
                    return av < bv ? -dir : av > bv ? dir : 0;
                });
                return arr;
            }, [filteredIndices, sortCol, sortDir, reviewDeals]);

            const totalPages = Math.ceil(sortedIndices.length / PAGE_SIZE);
            const pagedIndices = sortedIndices.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

            React.useEffect(() => { setPage(0); }, [search, filterMode, sortCol, sortDir]);

            // Early returns AFTER all hooks
            if (loadError) return h('div', { className: 'tab-content active' },
                h('div', { className: 'card', style: { padding: '40px', textAlign: 'center' } },
                    h('div', { style: { fontSize: '16px', color: '#9CA3AF', marginBottom: '12px' } }, loadError),
                    h('div', { style: { fontSize: '13px', color: '#6B7280' } }, 'The review.json file is generated by the weekly update pipeline.')
                )
            );

            if (!reviewDeals) return h('div', { className: 'tab-content active' },
                h('div', { style: { textAlign: 'center', padding: '40px', color: '#9CA3AF' } }, 'Loading review data...')
            );

            const toggleDeal = (idx) => {
                setReviewDeals(prev => {
                    const updated = [...prev];
                    const deal = { ...updated[idx] };
                    deal.cls = deal.cls === 'relevant' ? 'other' : 'relevant';
                    updated[idx] = deal;
                    return updated;
                });
                setChangeCount(c => c + 1);
            };

            const handleSort = (col) => {
                if (sortCol === col) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
                else { setSortCol(col); setSortDir(col === 'yr' || col === 'v' ? 'desc' : 'asc'); }
            };

            const SortTh = ({ col, label, style }) =>
                h('th', {
                    className: 'sortable' + (sortCol === col ? ' ' + sortDir : ''),
                    onClick: () => handleSort(col),
                    style: { ...style, cursor: 'pointer' }
                }, label);

            const relevantCount = reviewDeals.filter(d => d.cls === 'relevant').length;
            const otherCount = reviewDeals.filter(d => d.cls === 'other').length;

            // Download classified_deals.json
            const downloadClassifications = () => {
                const output = reviewDeals.map((d, i) => ({
                    idx: i, yr: d.yr, acq: d.acq, tgt: d.tgt, classification: d.cls
                }));
                const blob = new Blob([JSON.stringify(output)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'classified_deals.json';
                a.click();
                URL.revokeObjectURL(url);
            };

            // Download review.json (full data for next time)
            const downloadReviewJson = () => {
                const output = {
                    generated: new Date().toISOString().slice(0, 10),
                    totalDeals: reviewDeals.length,
                    deals: reviewDeals
                };
                const blob = new Blob([JSON.stringify(output)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'review.json';
                a.click();
                URL.revokeObjectURL(url);
            };

            // Page buttons (same pattern as AllDataTab)
            const pageButtons = () => {
                const btns = [];
                btns.push(h('button', { className: 'page-btn', key: 'prev', disabled: page === 0, onClick: () => setPage(p => p - 1) }, String.fromCharCode(8592)));
                const start = Math.max(0, page - 3);
                const end = Math.min(totalPages, start + 7);
                for (let i = start; i < end; i++) {
                    btns.push(h('button', { className: 'page-btn' + (i === page ? ' active' : ''), key: i, onClick: () => setPage(i) }, i + 1));
                }
                btns.push(h('button', { className: 'page-btn', key: 'next', disabled: page >= totalPages - 1, onClick: () => setPage(p => p + 1) }, String.fromCharCode(8594)));
                return btns;
            };

            return h('div', { className: 'tab-content active' },
                // Header
                h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '20px', flexWrap: 'wrap', gap: '16px' } },
                    h('div', null,
                        h('div', { style: { fontSize: '18px', fontWeight: 700, color: '#F9FAFB' } }, 'Deal Classification Review'),
                        h('div', { style: { fontSize: '13px', color: '#9CA3AF', marginTop: '4px' } },
                            reviewDeals.length.toLocaleString() + ' total deals: ',
                            h('span', { style: { color: '#178287' } }, relevantCount + ' relevant'),
                            ' / ',
                            h('span', { style: { color: '#6B7280' } }, otherCount + ' ignored'),
                            changeCount > 0 ? h('span', { style: { color: '#FFBD48', marginLeft: '12px' } }, '(' + changeCount + ' changes)') : null
                        )
                    ),
                    h('div', { style: { display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' } },
                        h('input', {
                            className: 'search-box',
                            type: 'text',
                            placeholder: 'Search deals...',
                            value: search,
                            onChange: (e) => setSearch(e.target.value),
                            style: { width: '220px' }
                        }),
                        // Filter buttons
                        h('button', {
                            className: 'page-btn' + (filterMode === 'all' ? ' active' : ''),
                            onClick: () => setFilterMode('all'),
                            style: { fontSize: '12px', padding: '6px 12px' }
                        }, 'All'),
                        h('button', {
                            className: 'page-btn' + (filterMode === 'relevant' ? ' active' : ''),
                            onClick: () => setFilterMode('relevant'),
                            style: { fontSize: '12px', padding: '6px 12px', color: filterMode === 'relevant' ? '#178287' : undefined }
                        }, 'Relevant'),
                        h('button', {
                            className: 'page-btn' + (filterMode === 'other' ? ' active' : ''),
                            onClick: () => setFilterMode('other'),
                            style: { fontSize: '12px', padding: '6px 12px', color: filterMode === 'other' ? '#EF4444' : undefined }
                        }, 'Ignored')
                    )
                ),

                // Download bar
                changeCount > 0 ? h('div', { style: {
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '12px 20px', marginBottom: '16px', borderRadius: '8px',
                    background: 'rgba(255,189,72,0.1)', border: '1px solid rgba(255,189,72,0.3)'
                } },
                    h('span', { style: { color: '#FFBD48', fontSize: '13px' } },
                        'You have unsaved changes. Download both files and commit to the repo to update the dashboard.'
                    ),
                    h('div', { style: { display: 'flex', gap: '8px' } },
                        h('button', {
                            onClick: downloadClassifications,
                            style: {
                                padding: '8px 16px', borderRadius: '6px', border: 'none', cursor: 'pointer',
                                background: '#FFBD48', color: '#202647', fontWeight: 600, fontSize: '13px'
                            }
                        }, 'Download classified_deals.json'),
                        h('button', {
                            onClick: downloadReviewJson,
                            style: {
                                padding: '8px 16px', borderRadius: '6px', border: '1px solid rgba(255,189,72,0.4)', cursor: 'pointer',
                                background: 'transparent', color: '#FFBD48', fontWeight: 500, fontSize: '13px'
                            }
                        }, 'Download review.json')
                    )
                ) : null,

                // Table
                h('div', { className: 'card' },
                    h('div', { className: 'table-container' },
                        h('table', null,
                            h('thead', null,
                                h('tr', null,
                                    h('th', { style: { width: '70px', textAlign: 'center' } }, 'Relevant'),
                                    h(SortTh, { col: 'yr', label: 'Year' }),
                                    h(SortTh, { col: 'acq', label: 'Acquirer' }),
                                    h(SortTh, { col: 'aR', label: 'Region', style: { width: '80px' } }),
                                    h(SortTh, { col: 'tgt', label: 'Target' }),
                                    h(SortTh, { col: 'tR', label: 'Region', style: { width: '80px' } }),
                                    h(SortTh, { col: 'v', label: 'Value ($M)', style: { textAlign: 'right', width: '100px' } })
                                )
                            ),
                            h('tbody', null,
                                pagedIndices.length === 0
                                    ? h('tr', null, h('td', { colSpan: 7, style: { textAlign: 'center', color: '#6B7280', padding: '40px' } }, 'No deals match your filter'))
                                    : pagedIndices.map(idx => {
                                        const d = reviewDeals[idx];
                                        const isRelevant = d.cls === 'relevant';
                                        return h('tr', { key: idx, style: { opacity: isRelevant ? 1 : 0.5 } },
                                            h('td', { style: { textAlign: 'center' } },
                                                h('input', {
                                                    type: 'checkbox',
                                                    checked: isRelevant,
                                                    onChange: () => toggleDeal(idx),
                                                    style: { width: '18px', height: '18px', cursor: 'pointer', accentColor: '#178287' }
                                                })
                                            ),
                                            h('td', null, d.yr),
                                            h('td', { style: { fontWeight: 600 } }, d.acq, d.acqC ? h('span', { style: { color: '#6B7280', marginLeft: '6px', fontSize: '11px' } }, '(' + d.acqC + ')') : null),
                                            h('td', null, h(RegionBadge, { region: d.aR || 'Other' })),
                                            h('td', null, d.tgt, d.tgtC ? h('span', { style: { color: '#6B7280', marginLeft: '6px', fontSize: '11px' } }, '(' + d.tgtC + ')') : null),
                                            h('td', null, h(RegionBadge, { region: d.tR || 'Other' })),
                                            h('td', { style: { textAlign: 'right', fontWeight: 600 } }, d.v ? '$' + d.v.toLocaleString() : String.fromCharCode(8212))
                                        );

                    ),

                        ...pageButtons(),
                        h('span', { className: 'page-info' }, 'Page ' + (page + 1) + ' of ' + totalPages + ' (' + sortedIndices.length + ' deals)')
                    ) : null
                ),

                // Instructions
                h('div', { style: { marginTop: '16px', padding: '16px 24px', background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.06)', borderRadius: '8px' } },
                    h('div', { style: { fontSize: '12px', color: '#9CA3AF', lineHeight: '1.8' } },
                        'Toggle checkboxes to classify deals as relevant (shown on dashboard) or ignored (excluded). ',

                        h('span', { style: { fontFamily: 'monospace', background: 'rgba(255,255,255,0.08)', padding: '2px 6px', borderRadius: '3px' } }, 'scraper/'),
                        ' directory. The GitHub Action will regenerate data.json automatically.'
                    )
                )
            );
        };

        // ── All Data Tab ──
        const AllDataTab = ({ data }) => {
            const [search, setSearch] = useState('');
            const [sortCol, setSortCol] = useState('yr');
            const [sortDir, setSortDir] = useState('desc');
            const [page, setPage] = useState(0);
            const PAGE_SIZE = 50;

            // Build master list from allDeals or fall back to combined arrays
            const allRows = React.useMemo(() => {
                if (data.allDeals && data.allDeals.length > 0) return data.allDeals;
                // Fallback: combine available arrays
                const pool = [];
                (data.topDeals || []).forEach(d => pool.push({ yr: d.yr, mo: '', type: '', acq: d.acq, acqC: '', aR: d.aR, tgt: d.tgt, tgtC: '', tR: d.tR, v: d.v, url: d.url }));
                (data.usaBuyEU || []).forEach(d => pool.push({ yr: d.yr, mo: '', type: '', acq: d.acq, acqC: '', aR: 'USA', tgt: d.tgt, tgtC: d.tgtC, tR: 'Europe', v: d.v, url: d.url }));
                (data.euBuyUSA || []).forEach(d => pool.push({ yr: d.yr, mo: '', type: '', acq: d.acq, acqC: d.acqC, aR: 'Europe', tgt: d.tgt, tgtC: '', tR: 'USA', v: d.v, url: d.url }));
                // Deduplicate by acq+tgt+yr
                const seen = new Set();
                return pool.filter(d => {
                    const k = d.acq + '|' + d.tgt + '|' + d.yr;
                    if (seen.has(k)) return false;
                    seen.add(k);
                    return true;
                });
            }, [data]);

            // Filter
            const filtered = React.useMemo(() => {
                if (!search.trim()) return allRows;
                const q = search.toLowerCase();
                return allRows.filter(d =>
                    (d.acq || '').toLowerCase().includes(q) ||
                    (d.tgt || '').toLowerCase().includes(q) ||
                    (d.acqC || '').toLowerCase().includes(q) ||
                    (d.tgtC || '').toLowerCase().includes(q) ||
                    (d.aR || '').toLowerCase().includes(q) ||
                    (d.tR || '').toLowerCase().includes(q) ||
                    (d.type || '').toLowerCase().includes(q) ||
                    String(d.yr).includes(q)
                );
            }, [allRows, search]);

            // Sort
            const sorted = React.useMemo(() => {
                const arr = [...filtered];
                const dir = sortDir === 'asc' ? 1 : -1;
                arr.sort((a, b) => {
                    let av = a[sortCol], bv = b[sortCol];
                    if (sortCol === 'v') { av = av || 0; bv = bv || 0; return (av - bv) * dir; }
                    if (sortCol === 'yr') { return ((av || 0) - (bv || 0)) * dir; }
                    av = (av || '').toLowerCase(); bv = (bv || '').toLowerCase();
                    return av < bv ? -dir : av > bv ? dir : 0;
                });
                return arr;
            }, [filtered, sortCol, sortDir]);

            // Pagination
            const totalPages = Math.ceil(sorted.length / PAGE_SIZE);
            const paged = sorted.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

            // Reset page on search/sort change
            React.useEffect(() => { setPage(0); }, [search, sortCol, sortDir]);

            const handleSort = (col) => {
                if (sortCol === col) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
                else { setSortCol(col); setSortDir(col === 'yr' || col === 'v' ? 'desc' : 'asc'); }
            };

            const SortTh = ({ col, label, style }) =>
                h('th', {
                    className: 'sortable' + (sortCol === col ? ' ' + sortDir : ''),
                    onClick: () => handleSort(col),
                    style: { ...style, cursor: 'pointer' }
                }, label);

            // Page buttons
            const pageButtons = () => {
                const btns = [];
                btns.push(h('button', { className: 'page-btn', key: 'prev', disabled: page === 0, onClick: () => setPage(p => p - 1) }, '←'));
                const start = Math.max(0, page - 3);
                const end = Math.min(totalPages, start + 7);
                for (let i = start; i < end; i++) {
                    btns.push(h('button', { className: 'page-btn' + (i === page ? ' active' : ''), key: i, onClick: () => setPage(i) }, i + 1));
                }
                btns.push(h('button', { className: 'page-btn', key: 'next', disabled: page >= totalPages - 1, onClick: () => setPage(p => p + 1) }, '→'));
                return btns;
            };

            return h('div', { className: 'tab-content active' },
                // Header bar
                h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px', flexWrap: 'wrap', gap: '16px' } },
                    h('div', null,
                        h('div', { style: { fontSize: '18px', fontWeight: 700, color: '#F9FAFB' } }, 'Complete M&A Database'),
                        h('div', { style: { fontSize: '13px', color: '#9CA3AF', marginTop: '4px' } },
                            sorted.length.toLocaleString() + ' deals' + (search ? ' matching "' + search + '"' : '') + (data.excludedDeals ? ' · ' + data.excludedDeals + ' ignored (relevance)' : '') + ' · Source: EPIC Photonics Index · Last updated: ' + (data.lastUpdated || '—')
                        )
                    ),
                    h('input', {
                        className: 'search-box',
                        type: 'text',
                        placeholder: 'Search deals by company, country, region, type…',
                        value: search,
                        onChange: (e) => setSearch(e.target.value)
                    })
                ),

                // Table
                h('div', { className: 'card' },
                    h('div', { className: 'table-container' },
                        h('table', null,
                            h('thead', null,
                                h('tr', null,
                                    h(SortTh, { col: 'yr', label: 'Year' }),
                                    h(SortTh, { col: 'acq', label: 'Acquirer' }),
                                    h(SortTh, { col: 'aR', label: 'Region', style: { width: '90px' } }),
                                    h(SortTh, { col: 'tgt', label: 'Target' }),
                                    h(SortTh, { col: 'tR', label: 'Region', style: { width: '90px' } }),
                                    h(SortTh, { col: 'v', label: 'Value ($M)', style: { textAlign: 'right' } }),
                                    h('th', { style: { width: '52px', textAlign: 'center' } }, '')
                                )
                            ),
                            h('tbody', null,
                                paged.length === 0
                                    ? h('tr', null, h('td', { colSpan: 7, style: { textAlign: 'center', color: '#6B7280', padding: '40px' } }, search ? 'No deals match your search' : 'No deal data available'))
                                    : paged.map((d, i) =>
                                        h('tr', { key: page * PAGE_SIZE + i },
                                            h('td', null, d.yr),
                                            h('td', { style: { fontWeight: 600 } }, d.acq),
                                            h('td', null, h(RegionBadge, { region: d.aR || 'Other' })),
                                            h('td', null, d.tgt, d.tgtC ? h('span', { style: { color: '#6B7280', marginLeft: '6px', fontSize: '12px' } }, '(' + d.tgtC + ')') : null),
                                            h('td', null, h(RegionBadge, { region: d.tR || 'Other' })),
                                            h('td', { style: { textAlign: 'right', fontWeight: 600 } }, d.v ? '$' + d.v.toLocaleString() : '—'),
                                            h('td', { style: { textAlign: 'center' } },
                                                d.url ? h('a', { href: d.url, target: '_blank', rel: 'noopener noreferrer', style: { color: '#FFBD48', textDecoration: 'none', fontSize: '12px' }, title: 'View deal details' }, 'Details ↗') : null
                                            )
                                        )
                                    )
                            )
                        )
                    ),
                    // Pagination
                    totalPages > 1 ? h('div', { className: 'pagination' },
                        ...pageButtons(),
                        h('span', { className: 'page-info' }, 'Page ' + (page + 1) + ' of ' + totalPages)
                    ) : null
                )
            );
        };

        // ── Footer ──
        const FooterSection = ({ data }) =>
            h('footer', { className: 'footer' },
                h('div', { className: 'footer-content' },
                    h(BerryIconSmall),
                    h('span', null, 'Powered by Cloudberry VC · Data from '),
                    h(EpicLink),
                    h('span', null, ' Photonics Index · Last updated: ' + data.lastUpdated)
                ),
                h('div', { style: { marginTop: '8px', fontSize: '11px', color: '#6B7280' } },
                    h('a', { href: 'https://photonics-index.org/ma/', target: '_blank', style: { fontSize: '11px' } }, 'EPIC Photonics Index — photonics-index.org/ma')
                ),
                data.excludedDeals ? h('div', { style: { marginTop: '16px', padding: '16px 24px', maxWidth: '900px', margin: '16px auto 0', background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.06)', borderRadius: '8px' } },
                    h('div', { style: { fontSize: '11px', fontWeight: 600, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '6px' } }, 'Data Integrity'),
                    h('div', { style: { fontSize: '11px', color: '#6B7280', lineHeight: '1.7' } },
                        'The EPIC Photonics Index source dataset contains ' + (data.totalUnfiltered || data.total + data.excludedDeals).toLocaleString() + ' M&A records spanning photonics, semiconductor, and adjacent sectors. ',
                        'To improve relevance, ' + data.excludedDeals + ' deals were ignored (pure software, pharma, fintech, and other non-hardware transactions) and excluded from all aggregates. ',
                        'Classification was performed using a two-stage process: keyword-based matching for clear-cut cases, followed by AI-assisted review (Anthropic Claude Haiku) for ambiguous deals. ',
                        'This dashboard shows the remaining ' + data.total.toLocaleString() + ' deals deemed relevant to photonics, semiconductors, and adjacent hardware. ',
                        'Only ~25\u201330% of deals disclose transaction values; all value-based metrics reflect this disclosed subset only.'
                    )
                ) : null
            );

        // Render
        const root = createRoot(document.getElementById('root'));
        root.render(h(App));
        injectTooltipTotals();
    </script>
</body>
</html>
