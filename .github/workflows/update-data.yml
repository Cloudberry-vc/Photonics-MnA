name: Weekly Photonics M&A Update

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run weekly update pipeline
        run: python scraper/weekly_update.py
        timeout-minutes: 10

      - name: Check for changes
        id: changes
        run: |
          echo "=== Files modified ==="
          git status --short
          git add data.json review.json scraper/classified_deals.json scraper/previous_alldeals.json
          echo "=== Staged changes ==="
          git diff --staged --stat
          git diff --staged --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Weekly M&A data update $(date +%Y-%m-%d)"
          git push
